<div class="wrap page-shell">
  <section class="hero"><div><p class="eyebrow"><i class="bi bi-star"></i> Admin reviews</p><h1>Review moderation</h1><p>Approve, reject, and reply to customer product reviews.</p></div></section>
  <section class="panel"><div class="toolbar"><h2>Moderation queue</h2><select class="input" style="max-width:220px" [(ngModel)]="status" (change)="load()"><option value="">All</option><option value="PENDING">Pending</option><option value="APPROVED">Approved</option><option value="REJECTED">Rejected</option></select></div>
    <div class="grid"><article class="card" *ngFor="let r of reviews"><div class="badge-line"><span class="status" [ngClass]="r.status">{{ r.status }}</span><span class="badge">{{ stars(r.rating) }}</span></div><h3>{{ r.productName }}</h3><p><strong>{{ r.title || 'Review' }}</strong></p><p>{{ r.comment }}</p><p class="meta">By {{ r.customerName || r.username }} · {{ r.createdAt | date:'medium' }}</p><label class="field"><span class="field-label">Admin reply</span><textarea class="textarea" rows="2" [ngModel]="r.id ? (reply[r.id] || r.adminReply || '') : ''" (ngModelChange)="setReply(r, $event)" [placeholder]="r.adminReply || 'Write a reply…'"></textarea></label><div class="actions"><button class="btn btn-soft btn-small" (click)="moderate(r, 'APPROVED')">Approve</button><button class="btn btn-ghost btn-small danger" (click)="moderate(r, 'REJECTED')">Reject</button></div></article></div>
  </section>
</div>
