<div class="root">
  <header class="site-header" role="banner">
    <div class="wrap header-inner">
      <a class="brand" routerLink="/home" aria-label="Go to homepage">
        <i class="bi bi-bag-heart-fill" aria-hidden="true"></i>
        <span class="brand-name">Shop</span>
      </a>

      <nav class="nav" aria-label="Primary navigation">
        <a class="nav-link" routerLink="/home" routerLinkActive="is-active"><i class="bi bi-house-door"></i> Home</a>
        <a class="nav-link" routerLink="/products" routerLinkActive="is-active"><i class="bi bi-grid"></i> Products</a>
        <a class="nav-link" routerLink="/profile" routerLinkActive="is-active"><i class="bi bi-person-circle"></i> Account</a>
        <a class="nav-link" routerLink="/admin" routerLinkActive="is-active"><i class="bi bi-kanban"></i> Admin</a>
      </nav>

      <div class="header-actions">
        <button class="icon-btn" type="button" (click)="toggleMobileMenu()" aria-label="Open menu">
          <i class="bi" [class.bi-list]="!isMobileMenuOpen" [class.bi-x-lg]="isMobileMenuOpen" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div class="mobile-nav" *ngIf="isMobileMenuOpen" role="navigation" aria-label="Mobile navigation">
      <div class="wrap mobile-nav-inner">
        <a class="mobile-link" routerLink="/home" (click)="closeMobileMenu()"><i class="bi bi-house-door"></i> Home</a>
        <a class="mobile-link" routerLink="/products" (click)="closeMobileMenu()"><i class="bi bi-grid"></i> Products</a>
        <a class="mobile-link" routerLink="/admin" (click)="closeMobileMenu()"><i class="bi bi-kanban"></i> Admin</a>
        <a class="mobile-link" routerLink="/profile" (click)="closeMobileMenu()"><i class="bi bi-person-circle"></i> Profile</a>
      </div>
    </div>
  </header>

  <main class="main" role="main">
    <router-outlet />
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="wrap footer-grid">
      <div>
        <div class="brand brand-footer">
          <i class="bi bi-bag-heart-fill" aria-hidden="true"></i>
          <span class="brand-name">Shop</span>
        </div>
        <p class="footer-text">
          Simple ecommerce UI for Angular.
        </p>
      </div>

      <div class="footer-col">
        <p class="footer-title">Explore</p>
        <a class="footer-link" routerLink="/home">Home</a>
        <a class="footer-link" routerLink="/products">Shop</a>
        <a class="footer-link" routerLink="/product-types">Categories</a>
      </div>

      <div class="footer-col">
        <p class="footer-title">Account</p>
        <a class="footer-link" routerLink="/profile">Profile</a>
        <a class="footer-link" routerLink="/admin">Admin</a>
      </div>

      <div class="footer-col">
        <p class="footer-title">Support</p>
        <a class="footer-link" href="#">Shipping</a>
        <a class="footer-link" href="#">Returns</a>
        <a class="footer-link" href="#">Contact</a>
      </div>
    </div>

    <div class="wrap footer-bottom">
      <p class="muted">© {{ currentYear }} Shop.</p>
    </div>
  </footer>
</div>
